name: Automated CV Activity with React Support

on:
  schedule:
    - cron: "30 22 * * *"
    - cron: "30 2 * * *"
    - cron: "30 6 * * *"
    - cron: "30 9 * * *"
    - cron: "30 13 * * *"
    - cron: "30 17 * * *"
  workflow_dispatch:

permissions:
  contents: write   # 🔥 REQUIRED FIX

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 🔥 future-proof

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout Code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true   # 🔥 ensures token works for push

      # 2️⃣ Setup Node
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 4️⃣ Install dependencies
      - name: Install React dependencies
        run: |
          npm ci || npm install
          npm audit fix || true

      # 5️⃣ React build (non-blocking)
      - name: Run React build
        run: |
          export CI=false
          npm run build || echo "Build failed, skipping..."

      # 6️⃣ Run Python script
      - name: Run auto update script
        run: python3 auto_update.py

      # 7️⃣ Commit & Push
      - name: Push auto commits
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if ! git diff --cached --quiet; then
            git commit -m "Automated update $(date)"
            git push
          else
            echo "No changes to commit"
          fi
